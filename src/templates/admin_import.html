<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>นำเข้าข้อมูล - IEP Smart Assistant</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-indigo-900 text-white shadow-lg mb-8">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-sm font-medium">
            <div class="flex items-center space-x-10">
                <div class="font-bold text-xl uppercase italic tracking-tighter border-r border-indigo-700 pr-10">
                    IEP Smart Assistant
                </div>

                <div class="flex space-x-8">
                    <a href="{{ url_for('chatbot_page') }}"
                        class="hover:text-indigo-300 transition text-indigo-100 {% if request.endpoint == 'chatbot_page' %}border-b-2 border-white pb-1{% endif %}">
                        Chatbot AI
                    </a>

                    <a href="{{ url_for('student_list_page') }}"
                        class="hover:text-indigo-300 transition text-indigo-100 {% if request.endpoint == 'student_list_page' %}border-b-2 border-white pb-1{% endif %}">
                        รายชื่อนักเรียน
                    </a>

                    {% if session['permission'] in ['Admin', 'Super Admin'] %}
                    <a href="{{ url_for('admin_dashboard') }}"
                        class="hover:text-indigo-300 transition text-indigo-100 {% if request.endpoint == 'admin_dashboard' %}border-b-2 border-white pb-1{% endif %}">
                        Dashboard
                    </a>

                    <a href="{{ url_for('admin_import_page') }}"
                        class="hover:text-indigo-300 transition text-indigo-100 {% if request.endpoint == 'admin_import_page' %}border-b-2 border-white pb-1{% endif %}">
                        Import
                    </a>

                    <a href="{{ url_for('register_page') }}"
                        class="hover:text-indigo-300 transition text-indigo-100 {% if request.endpoint == 'register_page' %}border-b-2 border-white pb-1{% endif %}">
                        Register
                    </a>
                    {% endif %}
                </div>
            </div>

            <div class="relative">
                <button onclick="toggleDropdown()"
                    class="bg-indigo-800 px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-700 transition flex items-center shadow-md">
                    {{ session['displayname'] }} <span class="ml-2 text-[10px]">▼</span>
                </button>

                <div id="user-menu"
                    class="absolute right-0 w-48 mt-2 py-2 bg-white rounded-xl shadow-xl hidden z-[150] text-slate-700 border border-slate-100">
                    <a href="{{ url_for('setting_page') }}"
                        class="block px-4 py-2 hover:bg-indigo-50 transition text-xs">⚙️ ตั้งค่า</a>
                    <hr class="my-1 border-slate-100">
                    <a href="/logout"
                        class="block px-4 py-2 text-sm text-rose-600 font-bold hover:bg-rose-50 transition">
                        ออกจากระบบ
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex flex-col items-center justify-center flex-grow px-4 pb-12 space-y-8">

        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-2xl w-full border border-gray-100">
            <h2 class="text-2xl font-extrabold mb-2 text-gray-800 text-center uppercase italic">📥 นำเข้าไฟล์
                (Excel/CSV)</h2>
            <p class="text-gray-400 text-center mb-8 text-sm italic border-b pb-4">
                อัปโหลดไฟล์ข้อมูลนักเรียนจำนวนมากเข้าสู่ระบบ</p>

            <div class="flex flex-col space-y-4">
                <div
                    class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center bg-gray-50 hover:bg-gray-100 transition-all">
                    <input type="file" id="file-input" class="hidden" accept=".xlsx, .csv"
                        onchange="handleFile(this.files)">
                    <button onclick="document.getElementById('file-input').click()"
                        class="text-indigo-600 font-bold hover:underline">
                        คลิกเพื่อเลือกไฟล์
                    </button>
                    <p id="file-name" class="text-xs text-gray-500 mt-2 italic font-medium"></p>
                </div>
                <button onclick="startUpload()" id="upload-btn" disabled
                    class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg transform active:scale-95 transition-all opacity-50 cursor-not-allowed uppercase tracking-widest text-sm">
                    ประมวลผลไฟล์
                </button>
            </div>
        </div>

        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-2xl w-full border border-gray-100">
            <h2 class="text-2xl font-extrabold mb-2 text-gray-800 text-center uppercase italic">👤
                เพิ่มข้อมูลนักเรียนรายคน</h2>
            <p class="text-gray-400 text-center mb-8 text-sm italic border-b pb-4">ระบุรายละเอียดนักเรียนรายบุคคล</p>

            <form id="student-form" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">ชื่อเล่น</label>
                        <input type="text" id="nickname"
                            class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 shadow-sm transition-all"
                            placeholder="ชื่อเล่น">
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">ชื่อจริง-นามสกุล</label>
                        <input type="text" id="fullname"
                            class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 shadow-sm transition-all"
                            placeholder="ชื่อ-นามสกุล" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">ชั้น</label>
                        <select id="grade"
                            class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 font-bold text-sm shadow-sm cursor-pointer"
                            required>
                            <option value="">เลือกชั้น (ป.1/1 - ป.6/17)</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">ประเภทความบกพร่อง</label>
                        <select id="disability_type"
                            class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 font-bold text-sm shadow-sm cursor-pointer">
                            <option value="0">0. บุคคลทั่วไป</option>
                            <option value="5">5. บกพร่องทางการเรียนรู้ (LD)</option>
                            <option value="7">7. ออทิสติก</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">วิธีรับมือ/เทคนิคเฉพาะ</label>
                    <textarea id="technique" rows="3"
                        class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 shadow-sm transition-all"
                        placeholder="เทคนิคการสอนเฉพาะบุคคล..."></textarea>
                </div>

                <button type="button" onclick="saveStudent()" id="save-btn"
                    class="w-full bg-blue-600 text-white font-bold py-4 mt-4 rounded-xl hover:bg-blue-700 shadow-lg transform active:scale-95 transition-all uppercase tracking-widest text-sm">
                    บันทึกข้อมูลนักเรียน
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. สร้างตัวเลือกชั้นเรียน ป.1/1 - ป.6/17 ---
        const gradeSelect = document.getElementById('grade');
        for (let p = 1; p <= 6; p++) {
            for (let room = 1; room <= 17; room++) {
                let opt = document.createElement('option');
                opt.value = `ป.${p}/${room}`;
                opt.textContent = `ป.${p}/${room}`;
                gradeSelect.appendChild(opt);
            }
        }

        // --- 2. ระบบ Dropdown ---
        function toggleDropdown() {
            const menu = document.getElementById('user-menu');
            menu.classList.toggle('hidden');
        }
        window.onclick = function (event) {
            if (!event.target.closest('.relative')) {
                const menu = document.getElementById('user-menu');
                if (menu && !menu.classList.contains('hidden')) menu.classList.add('hidden');
            }
        }

        // --- 3. ระบบไฟล์ ---
        let selectedFile = null;
        function handleFile(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                document.getElementById('file-name').innerText = `ไฟล์ที่เลือก: ${selectedFile.name}`;
                const btn = document.getElementById('upload-btn');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        async function startUpload() {
            if (!selectedFile) return;
            const formData = new FormData();
            formData.append('file', selectedFile);
            try {
                const res = await fetch('/api/import_excel', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.success) {
                    alert(result.message);
                    window.location.href = "{{ url_for('student_list_page') }}";
                } else { alert(result.error); }
            } catch (err) { alert('ระบบขัดข้อง'); }
        }

        // --- 4. ระบบบันทึกรายคน ---
        async function saveStudent() {
            const data = {
                nickname: document.getElementById('nickname').value,
                fullname: document.getElementById('fullname').value,
                grade: document.getElementById('grade').value,
                disability_type: document.getElementById('disability_type').value,
                technique: document.getElementById('technique').value
            };
            if (!data.fullname || !data.grade) return alert('กรุณาระบุชื่อและชั้นเรียน');

            try {
                const res = await fetch('/api/add_student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert(result.message);
                    document.getElementById('student-form').reset();
                }
            } catch (err) { alert('บันทึกไม่สำเร็จ'); }
        }
    </script>
</body>

</html>
